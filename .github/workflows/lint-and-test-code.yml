name: build

on:
  pull_request:
    branches:
      - master
      - release
      - 2.0

jobs:
  lint-code:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Install Dependencies
        run: yarn
      - name: Commit Linter
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: '.commitlintrc.yml'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run ESLinter
        run: yarn lint
      - name: Run Tests
        run: yarn test
      - name: codecov
        uses: codecov/codecov-action@v5
